{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Pendaftaran Akun</h2>
    <form method="POST" action="/register">
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Daftar Sebagai</label>
            <select name="role" id="roleSelect" class="w-full px-3 py-2 border rounded" onchange="toggleFields()">
                <option value="siswa">Siswa</option>
                <option value="tutor">Tutor Independen</option>
                <option value="admin">Admin Platform</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Nama Lengkap</label>
            <input type="text" name="nama_lengkap" class="w-full px-3 py-2 border rounded" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Email</label>
            <input type="email" name="email" class="w-full px-3 py-2 border rounded" required>
        </div>
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Password</label>
            <input type="password" name="password" class="w-full px-3 py-2 border rounded" required>
        </div>
        
        <div id="tutorFields" style="display: none;">
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">Spesialisasi Mapel</label>
                <input type="text" name="spesialisasi" placeholder="Cth: Fisika Dasar" class="w-full px-3 py-2 border rounded">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">Tarif per Jam (Rp)</label>
                <input type="number" name="tarif" placeholder="50000" class="w-full px-3 py-2 border rounded">
            </div>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Daftar Sekarang</button>
    </form>
    <p class="mt-4 text-center">Sudah punya akun? <a href="/login" class="text-blue-600 font-bold hover:underline">Login</a></p>
</div>

<script>
function toggleFields() {
    var role = document.getElementById("roleSelect").value;
    var tutorFields = document.getElementById("tutorFields");
    tutorFields.style.display = (role === "tutor") ? "block" : "none";
}
</script>
{% endblock %}
