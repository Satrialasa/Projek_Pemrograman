{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded shadow mt-10">
    <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Login TutorSync</h2>
    <form method="POST" action="/login">
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Email Akun</label>
            <input type="email" name="email" class="w-full px-3 py-2 border rounded" required>
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 font-bold mb-2">Password</label>
            <input type="password" name="password" class="w-full px-3 py-2 border rounded" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Masuk</button>
    </form>
    <p class="mt-4 text-center">Belum punya akun? <a href="/register" class="text-blue-600 font-bold hover:underline">Daftar di sini</a></p>
</div>
{% endblock %}
