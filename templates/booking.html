{% extends "base.html" %}
{% block content %}
<a href="/siswa" class="text-blue-600 font-bold mb-4 inline-block hover:underline">&larr; Kembali ke Daftar Tutor</a>
<h2 class="text-2xl font-bold mb-6 text-gray-800">Request Booking ke {{ tutor.nama_lengkap }}</h2>
<div class="bg-white p-6 rounded shadow max-w-lg">
    <form method="POST" action="/book/{{ tutor.id_tutor }}">
        <div class="mb-4">
            <label class="block text-gray-700 font-bold mb-2">Tanggal</label>
            <input type="date" name="tanggal" class="w-full px-3 py-2 border rounded" required>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-gray-700 font-bold mb-2">Waktu Mulai</label>
                <input type="time" name="waktu_mulai" class="w-full px-3 py-2 border rounded" required>
            </div>
            <div>
                <label class="block text-gray-700 font-bold mb-2">Waktu Selesai</label>
                <input type="time" name="waktu_selesai" class="w-full px-3 py-2 border rounded" required>
            </div>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">Kirim Request Booking & Buat Tagihan</button>
    </form>
</div>
{% endblock %}
